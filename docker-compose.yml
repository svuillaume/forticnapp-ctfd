# FortiCNAPP CTF — Docker Compose Stack
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   ctfd         — CTFd 3.7.5 web app (challenges, scoring, leaderboard)
#   db           — MariaDB backing store
#   cache        — Redis (sessions + rate-limiting)
#   bridge-static— Pushes 21 pre-authored YAML challenges (no API needed)
#   bridge       — Pulls live findings from FortiCNAPP API → challenges
#   trigger      — Lightweight HTTP API for web-based build triggers (port 5555)
#   caddy        — HTTPS reverse proxy via Let's Encrypt + DuckDNS DNS-01
#
# Quick start:
#   1. cp .env.example .env  and fill in values
#   2. docker compose up -d db cache ctfd
#   3. Open http://localhost:8000 → complete CTFd setup wizard
#   4. Admin Panel → Settings → Tokens → Generate → paste into .env as CTFD_ADMIN_TOKEN
#   5. docker compose up -d trigger
#   6. Open http://localhost:8000 → use the web cards to load challenges

services:

  # ── Core: CTFd web app ─────────────────────────────────────────────────────
  ctfd:
    image: ctfd/ctfd:3.7.5
    pull_policy: always
    container_name: forticnapp-ctfd
    restart: unless-stopped
    ports:
      # Bound to localhost — Caddy is the public TLS terminator.
      # Access directly at http://localhost:8000 when Caddy is not running.
      - "127.0.0.1:${CTFD_HOST_PORT:-8000}:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:${MYSQL_PASSWORD:-ctfd_change_me}@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=2
      - SECRET_KEY=${SECRET_KEY:-forticnapp-ctf-secret-key-2026}
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
      - APPLICATION_ROOT=/
    volumes:
      - ctfd-uploads:/var/uploads
      - ctfd-logs:/var/log/CTFd
      - ./theme:/opt/CTFd/CTFd/themes/core/static/custom:ro
      - ./theme/admin_base.html:/opt/CTFd/CTFd/themes/admin/templates/base.html:ro
    depends_on:
      db:    { condition: service_healthy }
      cache: { condition: service_healthy }
    networks:
      - ctf-net

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    pull_policy: always
    container_name: forticnapp-ctfd-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=${MYSQL_PASSWORD:-root}
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ctfd-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --wait_timeout=28800
      - --log-warnings=0
    networks:
      - ctf-net

  # ── Cache ──────────────────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    pull_policy: always
    container_name: forticnapp-ctfd-cache
    restart: unless-stopped
    volumes:
      - ctfd-cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ctf-net

  # ── Static bridge: push pre-authored YAML challenges ──────────────────────
  # One-shot job — run manually or triggered from the home page web UI.
  # docker compose run --rm bridge-static
  bridge-static:
    build: ./static_ctf
    pull_policy: always
    container_name: forticnapp-ctf-bridge-static
    restart: "no"
    environment:
      - CTFD_API_URL=http://ctfd:8000
      - CTFD_ADMIN_TOKEN=${CTFD_ADMIN_TOKEN}
      - FORTICNAPP_ACCOUNT=${FORTICNAPP_ACCOUNT:-forticnapp-demo}
      - FORTICNAPP_SUBACCOUNT=${FORTICNAPP_SUBACCOUNT:-}
      - CTF_NAME=${CTF_NAME:-Capture the Flag powered by FortiCNAPP}
      - STATIC_SCHEMA_DIR=/app/ctf
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - ctfd
    networks:
      - ctf-net

  # ── Dynamic bridge: pull live FortiCNAPP findings → challenges ─────────────
  # One-shot job — run manually or triggered from the home page web UI.
  # docker compose run --rm bridge
  bridge:
    build: ./forticnapp_ctf_api
    pull_policy: always
    container_name: forticnapp-ctf-bridge
    restart: "no"
    environment:
      - FORTICNAPP_ACCOUNT=${FORTICNAPP_ACCOUNT:-}
      - FORTICNAPP_SUBACCOUNT=${FORTICNAPP_SUBACCOUNT:-}
      - FORTICNAPP_API_KEY_ID=${FORTICNAPP_API_KEY_ID:-}
      - FORTICNAPP_API_SECRET=${FORTICNAPP_API_SECRET:-}
      - CTFD_API_URL=http://ctfd:8000
      - CTFD_ADMIN_TOKEN=${CTFD_ADMIN_TOKEN}
      - MOCK_MODE=${MOCK_MODE:-false}
      - SANITIZE=${SANITIZE:-true}
      - LOOKBACK_HOURS=${LOOKBACK_HOURS:-72}
      - MAX_CHALLENGES_PER_CATEGORY=${MAX_CHALLENGES_PER_CATEGORY:-5}
    volumes:
      - ./sample_data:/app/sample_data:ro
    depends_on:
      - ctfd
    networks:
      - ctf-net

  # ── Trigger service: web-based build triggers ──────────────────────────────
  # Always-on service. Home page JS calls it to start builds and reset challenges.
  # Endpoints: POST /run/static  POST /run/dynamic  POST /reset  GET /status/<mode>
  # Admin token stays inside this container — never exposed to the browser.
  trigger:
    build:
      context: .
      dockerfile: trigger/Dockerfile
    pull_policy: always
    container_name: forticnapp-ctf-trigger
    restart: unless-stopped
    # Port 5556: direct HTTP access for users who open CTFd on :8000 instead of Caddy :443.
    # Port 5555 (Caddy): HTTPS access through /trigger/* path on the main :443 proxy.
    ports:
      - "127.0.0.1:5556:5555"
    environment:
      - CTFD_API_URL=http://ctfd:8000
      - CTFD_ADMIN_TOKEN=${CTFD_ADMIN_TOKEN}
      - CTFD_ADMIN_PASSWORD=${CTFD_ADMIN_PASSWORD:-admin}
      - CTFD_ADMIN_NAME=${CTFD_ADMIN_NAME:-admin}
      - CTFD_ADMIN_EMAIL=${CTFD_ADMIN_EMAIL:-admin@ctf.local}
      - FORTICNAPP_ACCOUNT=${FORTICNAPP_ACCOUNT:-forticnapp-demo}
      - FORTICNAPP_SUBACCOUNT=${FORTICNAPP_SUBACCOUNT:-}
      - FORTICNAPP_API_KEY_ID=${FORTICNAPP_API_KEY_ID:-}
      - FORTICNAPP_API_SECRET=${FORTICNAPP_API_SECRET:-}
      - CTF_NAME=${CTF_NAME:-Capture the Flag powered by FortiCNAPP}
      - STATIC_SCHEMA_DIR=/app/ctf
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRIGGER_PORT=5555
      - INACTIVITY_RESET_HOURS=${INACTIVITY_RESET_HOURS:-24}
    depends_on:
      - ctfd
    networks:
      - ctf-net

  # ── Caddy: HTTPS reverse proxy ────────────────────────────────────────────────
  # Serves on :443 for ANY hostname — localhost, IP, FQDN all work.
  # Uses Caddy's built-in local CA (self-signed). Accept the browser warning once.
  # HTTP :80 redirects to HTTPS automatically.
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    pull_policy: always
    container_name: forticnapp-ctf-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"    # CTFd HTTPS
      - "5555:5555"  # Trigger HTTPS
    environment:
      FQDN: ${FQDN:-localhost}
    volumes:
      # NEVER delete caddy_data — Let's Encrypt rate-limits to 5 certs/domain/week
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ctfd
      - trigger
    networks:
      - ctf-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2019/config/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ctfd-uploads:
  ctfd-logs:
  ctfd-db:
  ctfd-cache:
  caddy_data:    # TLS certificates — never delete
  caddy_config:  # Caddy config cache

networks:
  ctf-net:
    driver: bridge
