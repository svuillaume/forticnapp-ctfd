- name: "Top Cloud Risk: One Word"
  value: 50
  type: standard
  state: visible
  description: |
    ## The #1 Cloud Security Risk

    According to every major cloud security report (CSA, Gartner, Verizon DBIR),
    the leading cause of cloud data breaches is not a sophisticated zero-day —
    it is something far more mundane: a **single, preventable error** made
    when configuring cloud services.

    ## Question
    What **one-word term** describes the leading root cause of cloud breaches —
    when a cloud service or resource is set up insecurely due to a human error
    or default setting left unchanged?

    ## Flag format
    `FLAG{oneword}`
  flags:
  - type: static
    data: case_insensitive
    content: 'FLAG{misconfiguration}'
  hints:
  - content: >
      It's a 16-letter word. An S3 bucket left public, an SSH port open to the world,
      MFA disabled on the root account — these are all examples of this.
    cost: 0
  tags:
  - value: default
  - value: cloud-risk
  - value: basics
