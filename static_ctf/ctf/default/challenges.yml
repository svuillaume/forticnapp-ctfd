- name: "What is CNAPP?"
  value: 50
  type: standard
  state: visible
  description: |
    ## Cloud-Native Application Protection Platform

    **CNAPP** is a unified cloud security platform that combines multiple
    disciplines to protect cloud-native applications from build time to runtime.

    ## Question
    What does the acronym **CNAPP** stand for?

    Enter each word separated by underscores, all lowercase.

    > **Hint:** Fortinet acquired Lacework to build its CNAPP offering — FortiCNAPP.

    ## Flag format
    `FLAG{word_word_word_word_word}`
  flags:
  - type: static
    data: case_insensitive
    content: 'FLAG{cloud_native_application_protection_platform}'
  hints:
  - content: >
      Think: what type of applications does this platform protect, and in what environment?
      Cloud + Native + Application + Protection + Platform.
    cost: 0
